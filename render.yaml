services:
  # 1. REDIS CACHE & LOCKING
  - type: redis
    name: chatsphere-redis
    plan: free
    ipAllowList: []

  # 2. RABBITMQ MESSAGE BROKER (Docker Image Runtime)
  - type: web
    name: chatsphere-rabbitmq
    runtime: image
    image:
      url: docker.io/library/rabbitmq:3-management-alpine
    plan: free

  # 3. CENTRAL CONFIG SERVER
  - type: web
    name: config-server
    env: docker
    plan: free
    dockerfilePath: config-server/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: native

  # 4. DISCOVERY SERVER (EUREKA)
  - type: web
    name: discovery-server
    env: docker
    plan: free
    dockerfilePath: discovery-server/Dockerfile
    envVars:
      - key: CONFIG_SERVER_URL
        value: http://config-server:8888

  # 5. API GATEWAY
  - type: web
    name: api-gateway
    env: docker
    plan: free
    dockerfilePath: api-gateway/Dockerfile
    envVars:
      - key: SPRING_REDIS_HOST
        value: chatsphere-redis
      - key: SPRING_DATA_REDIS_HOST
        value: chatsphere-redis

  # 6. AUTHENTICATION SERVICE
  - type: web
    name: auth-service
    env: docker
    plan: free
    dockerfilePath: auth-service/Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://dpg-d89k5scm0tmc739b4ce0-a.singapore-postgres.render.com:5432/fintech_svky?ssl=true
      - key: SPRING_DATASOURCE_USERNAME
        value: fintech_svky_user
      - key: SPRING_DATASOURCE_PASSWORD
        value: Aj9yQ1gc6u5f8uOvLrITRu40Xf7UZNFM
      - key: SPRING_RABBITMQ_HOST
        value: chatsphere-rabbitmq

